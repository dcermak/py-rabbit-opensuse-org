[tox]
envlist =
    format
    lint-{dataclassy,pydantic-v1,pydantic-v2}
    mypy-{dataclassy,pydantic-v1,pydantic-v2}
    test-{py310,py311,py312,py313}-{dataclassy,pydantic-v1,pydantic-v2}
    test-py314-pydantic-v2
    doc-{dataclassy,pydantic-v1,pydantic-v2}
    devel-{dataclassy,pydantic-v1,pydantic-v2}
skip_missing_interpreters = true

[testenv:test-{py310,py311,py312,py313}-{dataclassy,pydantic-v1,pydantic-v2}]
setenv =
    dataclassy: PY_RODO_BACKEND=dataclassy
    pydantic-v1: PY_RODO_BACKEND=pydantic-v1
    pydantic-v2: PY_RODO_BACKEND=pydantic-v2

base_python =
    py310: python3.10
    py311: python3.11
    py312: python3.12
    py313: python3.13

passenv = PY_RODO_BACKEND

extras =
    dataclassy: dataclassy
    pydantic-v1: pydantic-v1
    pydantic-v2: pydantic-v2

commands =
    python -c "from py_rodo.backend import __backend__; import os; backend = os.environ.get('PY_RODO_BACKEND'); assert __backend__ == backend; print(f'Backend verified: {__backend__}')"
    try-listening {posargs}

[testenv:doc-{dataclassy,pydantic-v1,pydantic-v2}]
setenv =
    dataclassy: PY_RODO_BACKEND=dataclassy
    pydantic-v1: PY_RODO_BACKEND=pydantic-v1
    pydantic-v2: PY_RODO_BACKEND=pydantic-v2

passenv = PY_RODO_BACKEND

extras =
    dataclassy: dataclassy
    pydantic-v1: pydantic-v1
    pydantic-v2: pydantic-v2

deps = Sphinx

commands =
    sphinx-build -M html source build -W

# Python 3.14 only supports pydantic-v2 (dataclassy and pydantic-v1 are incompatible)
[testenv:test-py314-pydantic-v2]
base_python = python3.14
setenv =
    PY_RODO_BACKEND=pydantic-v2
passenv = PY_RODO_BACKEND
extras = pydantic-v2
commands =
    python -c "from py_rodo.backend import __backend__; assert __backend__ == 'pydantic-v2'; print(f'Backend verified: {__backend__}')"
    try-listening {posargs}

# Development environments for launching editors/tools with backend generated
[testenv:devel-{dataclassy,pydantic-v1,pydantic-v2}]
usedevelop = true
allowlist_externals = *
passenv = *
extras =
    dataclassy: dataclassy
    pydantic-v1: pydantic-v1
    pydantic-v2: pydantic-v2
commands_pre =
    dataclassy: python scripts/generate_backend.py dataclassy
    pydantic-v1: python scripts/generate_backend.py pydantic-v1
    pydantic-v2: python scripts/generate_backend.py pydantic-v2
commands =
    {posargs}

[testenv:format]
skip_install = true
deps = ruff>=0.7.0
commands =
    ruff format --check --diff .

[testenv:format-fix]
skip_install = true
deps = ruff>=0.7.0
commands =
    ruff format .

# Linting environments - one per backend to ensure compatibility
[testenv:lint-dataclassy]
skip_install = true
deps =
    ruff>=0.7.0
    dataclassy>=1.0.1
commands_pre =
    python scripts/generate_backend.py dataclassy
commands =
    ruff check {posargs} .

[testenv:lint-pydantic-v1]
skip_install = true
deps =
    ruff>=0.7.0
    pydantic<2.0
commands_pre =
    python scripts/generate_backend.py pydantic-v1
commands =
    ruff check {posargs} .

[testenv:lint-pydantic-v2]
skip_install = true
deps =
    ruff>=0.7.0
    pydantic>=2.0
commands_pre =
    python scripts/generate_backend.py pydantic-v2
commands =
    ruff check {posargs} .

# mypy environments generate backend.py in src/ for type checking
[testenv:mypy-dataclassy]
skip_install = true
deps =
    dataclassy>=1.0.1
    mypy>=1.12.1
    types-pika>=1.2.0b1
commands_pre =
    python scripts/generate_backend.py dataclassy
commands =
    mypy --config-file mypy.ini src

[testenv:mypy-pydantic-v1]
skip_install = true
deps =
    pydantic<2.0
    mypy>=1.12.1
    types-pika>=1.2.0b1
commands_pre =
    python scripts/generate_backend.py pydantic-v1
commands =
    mypy --config-file mypy-pydantic.ini src

[testenv:mypy-pydantic-v2]
skip_install = true
deps =
    pydantic>=2.0
    mypy>=1.12.1
    types-pika>=1.2.0b1
commands_pre =
    python scripts/generate_backend.py pydantic-v2
commands =
    mypy --config-file mypy-pydantic.ini src
